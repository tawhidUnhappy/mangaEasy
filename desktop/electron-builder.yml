appId: com.mangaeasy.app
productName: mangaEasy
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
# The PyInstaller-built mangaeasy backend (see packaging/mangaeasy.spec) —
# copied into resources/backend/ by `npm run bundle:backend` (dev/CI) before
# electron-builder runs. extraResources are never asar-packed, so the
# backend exe stays a plain, directly-spawnable file inside the install.
extraResources:
  - from: resources/backend
    to: backend
# One naming convention across every platform/target, always carrying the
# real release version (CI stamps it into package.json from the git tag).
win:
  executableName: mangaeasy-desktop
  # Portable only — deliberately no nsis target. An installer writes a
  # registry uninstall key + Start Menu shortcut outside the install folder,
  # which would survive deleting that folder. Portable keeps the promise
  # that deleting the folder removes everything mangaEasy ever touched.
  target:
    - portable
portable:
  artifactName: mangaEasy-${version}-windows-${arch}-portable.${ext}
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
  target:
    - dmg
    - zip
  artifactName: mangaEasy-${version}-mac-${arch}.${ext}
dmg:
  artifactName: mangaEasy-${version}-mac-${arch}.${ext}
linux:
  target:
    - AppImage
    - deb
    - tar.gz
  artifactName: mangaEasy-${version}-linux-${arch}.${ext}
  maintainer: tawhidUnhappy <cyconsultancybd@gmail.com>
  category: AudioVideo
appImage:
  artifactName: mangaEasy-${version}-linux-${arch}.${ext}
npmRebuild: false
# Release uploads are done by the GitHub Actions workflow
# (.github/workflows/release.yml), not electron-builder's publisher.
publish: null
