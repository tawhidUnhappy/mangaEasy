name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  build:
    name: Build - ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            electron-builder-flag: --win
          - platform: linux
            os: ubuntu-22.04
            electron-builder-flag: --linux
          - platform: macos
            os: macos-latest
            electron-builder-flag: --mac

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install uv
        run: python -m pip install uv

      - name: Set version
        shell: bash
        run: |
          echo "MANGAEASY_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Sync Python dependencies
        run: uv sync --group dev

      - name: Sanity check package
        run: |
          uv run python -m compileall -q mangaeasy
          uv run mangaeasy --version

      # Vendors ffmpeg/uv/git-lfs into mangaeasy's own .mangaeasy/tools dir
      # (see mangaeasy/tools/vendored.py) so the shipped app never needs to
      # download them on a fresh install.
      - name: Vendor core binaries (ffmpeg/uv/git-lfs)
        run: uv run mangaeasy bootstrap-tools

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      # Builds the PyInstaller backend (packaging/mangaeasy.spec, excludes
      # torch/transformers — those stay in isolated install-tool envs) and
      # copies it into desktop/resources/backend/, then runs electron-builder
      # for this platform. electron-builder.yml's extraResources bundles that
      # backend folder straight into the installer/portable output, so the
      # shipped app needs no system Python or uv at all.
      - name: Bundle Python backend into desktop/resources/backend
        working-directory: desktop
        run: npm run bundle:backend

      - name: Build Electron app (installer + portable)
        working-directory: desktop
        run: npm run build && npx electron-builder ${{ matrix.electron-builder-flag }}

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release-assets
          cd desktop/dist
          find . -maxdepth 1 -type f \( \
            -name "*.exe" -o -name "*.dmg" -o -name "*.zip" -o \
            -name "*.AppImage" -o -name "*.deb" -o -name "*.tar.gz" -o -name "*.snap" \
          \) -exec cp {} ../../release-assets/ \;

      - name: Upload build assets
        uses: actions/upload-artifact@v4
        with:
          name: mangaeasy-${{ matrix.platform }}
          path: release-assets/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: mangaEasy ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: release-assets/**/*
          body: |
            ## mangaEasy ${{ github.ref_name }}

            Self-contained Electron desktop app — no system Python, uv, or
            ffmpeg required. Everything lives under the install folder's own
            `.mangaeasy/` directory; delete that folder (or uninstall) and
            nothing is left behind anywhere else on the machine.

            GPU acceleration (NVIDIA CUDA, Apple Silicon MPS) is detected and
            configured automatically on first run — no manual setup needed.
            Everything else falls back to CPU.

            ### Downloads

            #### Windows
            - `*-setup.exe` — installer
            - `*-portable.exe` — no install, just run it

            #### macOS
            - `*.dmg` — installer
            - `*-mac.zip` — portable

            #### Linux
            - `*.AppImage` — portable, no install
            - `*.deb` — installer (Debian/Ubuntu)
            - `*.tar.gz` — portable archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
