name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: ubuntu-latest
          - os: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Install Python via uv
        run: uv python install

      # Install system libs so pywebview can be imported during PyInstaller analysis
      - name: Install system deps (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev

      - name: Install project dependencies
        run: uv sync --dev

      - name: Build standalone bundle
        run: uv run pyinstaller packaging/mangaeasy.spec --distpath dist --workpath build-tmp --noconfirm

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # WINDOWS
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      - name: "[Win] Portable zip"
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\mangaEasy -DestinationPath mangaEasy-windows.zip -Force

      - name: "[Win] Installer via Inno Setup"
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=$version" `
            "packaging\mangaeasy.iss"

      - name: "[Win] Upload portable"
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: mangaEasy-windows.zip
          path: mangaEasy-windows.zip

      - name: "[Win] Upload installer"
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: mangaEasy-windows-installer
          path: dist/mangaEasy-Setup-*.exe

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # LINUX
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      - name: "[Linux] Portable tar.gz"
        if: runner.os == 'Linux'
        run: tar -czf mangaEasy-linux.tar.gz -C dist mangaEasy

      - name: "[Linux] Build .deb installer"
        if: runner.os == 'Linux'
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          # ── package directory layout ──────────────────────
          mkdir -p deb/opt/mangaEasy
          mkdir -p deb/usr/share/applications
          mkdir -p deb/DEBIAN

          cp -r dist/mangaEasy/. deb/opt/mangaEasy/
          chmod +x deb/opt/mangaEasy/mangaeasy

          # ── postinst: create /usr/local/bin symlink ───────
          cat > deb/DEBIAN/postinst << 'SCRIPT'
          #!/bin/bash
          set -e
          mkdir -p /usr/local/bin
          ln -sf /opt/mangaEasy/mangaeasy /usr/local/bin/mangaeasy
          chmod +x /opt/mangaEasy/mangaeasy
          SCRIPT
          chmod 0755 deb/DEBIAN/postinst

          # ── postrm: remove symlink on uninstall ───────────
          cat > deb/DEBIAN/postrm << 'SCRIPT'
          #!/bin/bash
          set -e
          rm -f /usr/local/bin/mangaeasy
          SCRIPT
          chmod 0755 deb/DEBIAN/postrm

          # ── .desktop entry ────────────────────────────────
          cat > deb/usr/share/applications/mangaeasy.desktop << EOF
          [Desktop Entry]
          Name=mangaEasy
          Comment=Manga to video automation
          Exec=/opt/mangaEasy/mangaeasy app
          Terminal=true
          Type=Application
          Categories=Multimedia;Video;
          EOF

          # ── control file ──────────────────────────────────
          INSTALLED_SIZE=$(du -sk deb/opt | cut -f1)
          cat > deb/DEBIAN/control << EOF
          Package: mangaeasy
          Version: ${VERSION}
          Architecture: amd64
          Maintainer: mangaEasy contributors <https://github.com/tawhidUnhappy/mangaEasy>
          Installed-Size: ${INSTALLED_SIZE}
          Description: Manga to video automation tool
           Turn manga panels or any folder of images into narrated videos.
           Bundles all dependencies — no Python or uv required.
          Homepage: https://github.com/tawhidUnhappy/mangaEasy
          EOF

          dpkg-deb --build deb mangaEasy-linux.deb

      - name: "[Linux] Upload portable"
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: mangaEasy-linux.tar.gz
          path: mangaEasy-linux.tar.gz

      - name: "[Linux] Upload .deb"
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: mangaEasy-linux.deb
          path: mangaEasy-linux.deb

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # MACOS
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      - name: "[macOS] Portable tar.gz"
        if: runner.os == 'macOS'
        run: tar -czf mangaEasy-macos.tar.gz -C dist mangaEasy

      - name: "[macOS] Build .pkg installer"
        if: runner.os == 'macOS'
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          # ── payload: goes to /opt/mangaEasy ───────────────
          mkdir -p pkg-payload/opt/mangaEasy
          cp -r dist/mangaEasy/. pkg-payload/opt/mangaEasy/
          chmod +x pkg-payload/opt/mangaEasy/mangaeasy

          # ── scripts: postinstall creates /usr/local/bin symlink ──
          mkdir -p pkg-scripts
          cat > pkg-scripts/postinstall << 'SCRIPT'
          #!/bin/bash
          set -e
          mkdir -p /usr/local/bin
          ln -sf /opt/mangaEasy/mangaeasy /usr/local/bin/mangaeasy
          chmod +x /opt/mangaEasy/mangaeasy
          SCRIPT
          chmod +x pkg-scripts/postinstall

          # ── build component package ───────────────────────
          pkgbuild \
            --root pkg-payload \
            --scripts pkg-scripts \
            --identifier com.mangaeasy.app \
            --version "$VERSION" \
            --install-location / \
            mangaEasy-macos.pkg

      - name: "[macOS] Upload portable"
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: mangaEasy-macos.tar.gz
          path: mangaEasy-macos.tar.gz

      - name: "[macOS] Upload .pkg"
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: mangaEasy-macos.pkg
          path: mangaEasy-macos.pkg

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # RELEASE
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: "mangaEasy ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## mangaEasy ${{ github.ref_name }}

            ### Download

            #### Windows
            | File | Type | Notes |
            |---|---|---|
            | `mangaEasy-Setup-${{ github.ref_name }}.exe` | **Installer** | Wizard — installs to Program Files, Start Menu shortcut, optional PATH |
            | `mangaEasy-windows.zip` | Portable | Extract anywhere, double-click `mangaeasy.exe` — no install needed |

            #### Linux (x64)
            | File | Type | Notes |
            |---|---|---|
            | `mangaEasy-linux.deb` | **Installer** | `sudo dpkg -i mangaEasy-linux.deb` — installs to `/opt/mangaEasy/`, adds `mangaeasy` to PATH |
            | `mangaEasy-linux.tar.gz` | Portable | Extract and run `./mangaEasy/mangaeasy` — no install needed |

            #### macOS
            | File | Type | Notes |
            |---|---|---|
            | `mangaEasy-macos.pkg` | **Installer** | Double-click — installs to `/opt/mangaEasy/`, adds `mangaeasy` to PATH |
            | `mangaEasy-macos.tar.gz` | Portable | Extract and run `./mangaEasy/mangaeasy` — no install needed |

            ---

            ### First run

            1. Launch mangaEasy (double-click exe / `mangaeasy app` in terminal).
            2. The control centre opens in your browser at `http://127.0.0.1:5000`.
            3. Go to the **Setup** tab to download ffmpeg and AI tools on first launch.

            > **Python and uv are not required** — everything is bundled.

            ### System requirements
            - Windows 10/11, Ubuntu 20.04+, or macOS 12+
            - ffmpeg — downloaded automatically on first launch
            - NVIDIA GPU — optional; needed only for IndexTTS voice cloning (Kokoro TTS runs on CPU)

            ### macOS note
            macOS may block the app on first launch. Right-click → Open to allow it, or run once in Terminal:
            ```bash
            sudo xattr -cr /opt/mangaEasy   # for .pkg install
            xattr -cr mangaEasy             # for portable tar.gz
            ```
          files: |
            artifacts/mangaEasy-Setup-*.exe
            artifacts/mangaEasy-windows.zip
            artifacts/mangaEasy-linux.deb
            artifacts/mangaEasy-linux.tar.gz
            artifacts/mangaEasy-macos.pkg
            artifacts/mangaEasy-macos.tar.gz
