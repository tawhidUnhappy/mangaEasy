name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  UV_VERSION: "0.11.16"

jobs:
  build:
    name: Build — ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform:   windows
            os:         windows-latest
            rust-target: x86_64-pc-windows-msvc
            uv-archive:  uv-x86_64-pc-windows-msvc.zip
            uv-triple:   x86_64-pc-windows-msvc

          - platform:   linux
            os:         ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            uv-archive:  uv-x86_64-unknown-linux-gnu.tar.gz
            uv-triple:   x86_64-unknown-linux-gnu

          - platform:   macos
            os:         macos-latest
            rust-target: aarch64-apple-darwin
            uv-archive:  uv-aarch64-apple-darwin.tar.gz
            uv-triple:   aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "app/src-tauri -> target"

      # ── Linux: webkit2gtk + AppImage tooling ──────────────────────────────
      - name: System deps (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            patchelf libfuse2

      # ── Frontend deps + icon generation ───────────────────────────────────
      - name: Install frontend deps
        working-directory: app
        run: npm install

      - name: Generate Tauri icon set
        working-directory: app
        run: npx @tauri-apps/cli icon ../packaging/icon.png

      # ── uv sidecar — Windows ──────────────────────────────────────────────
      - name: Download uv sidecar (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $url = "https://github.com/astral-sh/uv/releases/download/$env:UV_VERSION/${{ matrix.uv-archive }}"
          Invoke-WebRequest -Uri $url -OutFile uv.zip
          Expand-Archive uv.zip -DestinationPath uv-tmp
          New-Item -ItemType Directory -Force app/src-tauri/binaries | Out-Null
          $exe = Get-ChildItem -Recurse uv-tmp -Filter uv.exe |
                   Where-Object { $_.Name -eq "uv.exe" } |
                   Select-Object -First 1
          Copy-Item $exe.FullName "app/src-tauri/binaries/uv-${{ matrix.uv-triple }}.exe"

      # ── uv sidecar — macOS / Linux ────────────────────────────────────────
      - name: Download uv sidecar (macOS / Linux)
        if: matrix.platform != 'windows'
        run: |
          mkdir -p app/src-tauri/binaries
          URL="https://github.com/astral-sh/uv/releases/download/${UV_VERSION}/${{ matrix.uv-archive }}"
          TMP_UV="$(mktemp -d)"
          curl -fsSL "$URL" | tar -xz -C "$TMP_UV"
          UV_BIN=$(find "$TMP_UV" -type f -name "uv" | head -1)
          test -n "$UV_BIN"
          cp "$UV_BIN" "app/src-tauri/binaries/uv-${{ matrix.uv-triple }}"
          chmod +x "app/src-tauri/binaries/uv-${{ matrix.uv-triple }}"

      # ── Tauri build + upload to GitHub Release ────────────────────────────
      - name: Build & release (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app
          tagName: ${{ github.ref_name }}
          releaseName: "mangaEasy ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          includeUpdaterJson: false
          releaseBody: |
            ## mangaEasy ${{ github.ref_name }}

            ### Downloads

            #### Windows (x64)
            | File | Notes |
            |---|---|
            | `mangaEasy_*_x64-setup.exe` | NSIS installer — per-user or machine-wide |
            | `mangaEasy_*_x64_en-US.msi` | MSI installer |
            | `mangaEasy-windows-portable.zip` | Portable — extract and run, no install |

            #### Linux (x64)
            | File | Notes |
            |---|---|
            | `mangaEasy_*_amd64.AppImage` | Universal portable (recommended) |
            | `mangaEasy_*_amd64.deb` | Debian / Ubuntu package |

            #### macOS (Apple Silicon)
            | File | Notes |
            |---|---|
            | `mangaEasy_*_aarch64.dmg` | Disk image |

            ---

            **First run:** mangaEasy auto-installs its Python backend on first launch using the bundled **uv** tool. No Python or pip required — just download and run.

            **macOS gate:** If Gatekeeper blocks the app, right-click → Open, or:
            ```bash
            xattr -cr /Applications/mangaEasy.app
            ```

            **System requirements:** Windows 10/11, Ubuntu 20.04+, or macOS 12+.
            NVIDIA GPU optional — needed only for GPU-accelerated AI tools; Kokoro TTS runs on CPU.

      # ── Windows portable zip (raw exe) ────────────────────────────────────
      - name: Create Windows portable zip
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse "app/src-tauri/target/release" `
                   -Filter "mangaeasy.exe" -Depth 1 |
                   Select-Object -First 1
          New-Item -ItemType Directory -Force portable-win | Out-Null
          Copy-Item $exe.FullName portable-win/
          Compress-Archive -Path portable-win -DestinationPath mangaEasy-windows-portable.zip -Force

      - name: Upload Windows portable to release
        if: matrix.platform == 'windows'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          files: mangaEasy-windows-portable.zip
