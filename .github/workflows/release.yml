name: Build and release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.12"

jobs:
  build:
    name: Build / ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    continue-on-error: ${{ matrix.optional == true }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
          - platform: linux
            os: ubuntu-22.04
          - platform: macos-arm64
            os: macos-latest
          - platform: macos-intel
            os: macos-15-intel
            optional: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set build version
        shell: bash
        run: echo "MEDIACONDUCTOR_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Verify tag and source versions
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          pyproject=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          package=$(python -c "import re; print(re.search(r'__version__ = \"(.+?)\"', open('mangaeasy/__init__.py', encoding='utf-8').read()).group(1))")
          echo "tag=$tag pyproject=$pyproject package=$package"
          if [ "$tag" != "$pyproject" ] || [ "$tag" != "$package" ]; then
            echo "::error::Version mismatch. Run scripts/release.py before tagging."
            exit 1
          fi

      - name: Sync locked dependencies
        run: uv sync --locked --group dev

      - name: Lint, compile, and test
        run: |
          uv run --no-sync ruff check .
          uv run --no-sync python -m compileall -q mangaeasy scripts
          uv run --no-sync pytest

      - name: Verify Python distributions
        run: |
          uv build
          uv run --no-sync python scripts/check_distribution.py dist

      # Heavy AI stacks stay in isolated install-tool environments and are not
      # frozen. Core executables are provisioned on first use.
      - name: Build frozen CLI and MCP server
        run: uv run --no-sync pyinstaller packaging/mediaconductor.spec

      - name: Verify macOS bundle icon
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          bundle="dist/MediaConductor.app"
          icon=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIconFile' "$bundle/Contents/Info.plist")
          test -n "$icon"
          test -s "$bundle/Contents/Resources/$icon"

      - name: Smoke-test frozen CLI and MCP server
        shell: bash
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" = "macOS" ]; then
            backend="dist/MediaConductor.app/Contents/MacOS/mediaconductor"
          elif [ "$RUNNER_OS" = "Windows" ]; then
            backend="dist/MediaConductor/mediaconductor.exe"
          else
            backend="dist/MediaConductor/mediaconductor"
          fi
          "$backend" --version
          "$backend" doctor --json | python -c "import json,sys; json.loads(sys.stdin.read().strip().splitlines()[-1]); print('doctor JSON ok')"
          python scripts/smoke_mcp.py "$backend" mcp
          python scripts/smoke_mcp.py "$backend" mcp --mode manga-video
          python scripts/smoke_mcp.py "$backend" mcp --mode ai-story
          python scripts/smoke_mcp.py "$backend" mcp --mode song-video

      - name: Package release archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          if [ "$RUNNER_OS" = "macOS" ]; then
            (cd dist && zip -qry "../release-assets/media-conductor-${{ matrix.platform }}.zip" MediaConductor.app)
          elif [ "$RUNNER_OS" = "Windows" ]; then
            (cd dist && 7z a -tzip "../release-assets/media-conductor-${{ matrix.platform }}.zip" MediaConductor >/dev/null)
          else
            (cd dist && tar czf "../release-assets/media-conductor-${{ matrix.platform }}.tar.gz" MediaConductor)
          fi

      - name: Upload build assets
        uses: actions/upload-artifact@v4
        with:
          name: media-conductor-${{ matrix.platform }}
          path: release-assets/*
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    steps:
      - name: Download build assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: MediaConductor ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: release-assets/**/*
          body: |
            ## MediaConductor ${{ github.ref_name }}

            MediaConductor is a CLI and MCP server for manga video, AI story,
            and song video production. These archives contain the frozen
            `mediaconductor` executable and do not require a system Python.

            AI models and media tools are intentionally not embedded. After
            unpacking, run `mediaconductor modes`, then
            `mediaconductor setup --mode <mode>` to provision only the selected
            mode in isolated environments. A source install is also available:

            `uv tool install git+${{ github.server_url }}/${{ github.repository }}.git`

            See [README.md](${{ github.server_url }}/${{ github.repository }}/blob/main/README.md)
            for setup and mode-specific examples and
            [CHANGELOG.md](${{ github.server_url }}/${{ github.repository }}/blob/main/CHANGELOG.md)
            for the release history.

            ### Downloads

            - **Windows** — `media-conductor-windows.zip`; run
              `MediaConductor\mediaconductor.exe --help`. The unsigned build may
              trigger SmartScreen.
            - **macOS** — `media-conductor-macos-arm64.zip` (and an Intel build
              when available). Run `xattr -cr MediaConductor.app` once, then use
              `MediaConductor.app/Contents/MacOS/mediaconductor`.
            - **Linux** — `media-conductor-linux.tar.gz`; run
              `MediaConductor/mediaconductor --help`.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
