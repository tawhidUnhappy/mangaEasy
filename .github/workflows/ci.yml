name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: Checks / ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-py310
            os: ubuntu-22.04
            python: "3.10"
          - name: linux-py312
            os: ubuntu-22.04
            python: "3.12"
            build_package: true
          - name: windows-py312
            os: windows-latest
            python: "3.12"
          - name: macos-py312
            os: macos-latest
            python: "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Sync locked dependencies
        run: uv sync --python ${{ matrix.python }} --locked --group dev

      - name: Lint
        run: uv run --no-sync ruff check .

      - name: Compile package and release helpers
        run: uv run --no-sync python -m compileall -q mangaeasy scripts

      - name: Test console entry points
        run: |
          uv run --no-sync mediaconductor --version
          uv run --no-sync mangaeasy --version

      - name: Smoke-test MCP protocol
        run: uv run --no-sync python scripts/smoke_mcp.py mediaconductor mcp

      - name: Tests
        run: uv run --no-sync pytest

      - name: Build wheel and source distribution
        if: matrix.build_package == true
        run: uv build

      - name: Verify distribution payload
        if: matrix.build_package == true
        run: uv run --no-sync python scripts/check_distribution.py dist
